name: Release

# NOTE: WASM build is currently disabled due to tokio::spawn requiring Send futures,
# which nostr-sdk doesn't provide. WASM support requires significant refactoring.
# See: https://github.com/kako-jun/nostr-arena-js/issues/1

on:
  workflow_dispatch:  # Manual trigger only until WASM support is ready
  # push:
  #   tags:
  #     - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build
        run: wasm-pack build --target web

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          cd pkg
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Package for release
        run: |
          cd pkg
          tar czf ../nostr-arena-js.tar.gz .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: nostr-arena-js.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
